[package]
name = "hifi"
version = "0.1.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.12", features = ["rustls-tls", "http2", "gzip", "brotli"], default-features = false }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
aho-corasick = "1"
serde_json = "1"
futures = "0.3"
url = "2"
serde = { version = "1.0.228", features = ["derive"] }

[profile.release]
lto = true
codegen-units = 1
strip = true
