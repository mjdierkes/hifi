[package]
name = "hifi"
version = "0.1.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.12", features = ["brotli", "deflate", "gzip", "http2", "rustls-tls-webpki-roots", "stream", "zstd"], default-features = false }
tokio = { version = "1", default-features = false, features = ["rt-multi-thread", "net", "io-util", "sync"] }
aho-corasick = "1"
bytes = "1"
futures-util = { version = "0.3", default-features = false, features = ["std"] }
memchr = "2"
lru = "0.16"
libc = "0.2"
rustc-hash = "2"
serde_json = "1"
thiserror = "2"
url = { version = "2", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }

[dev-dependencies]
tokio = { version = "1", default-features = false, features = ["macros"] }

[profile.release]
lto = "thin"
codegen-units = 16
opt-level = 3
panic = "abort"
strip = true

[profile.dist]
inherits = "release"
lto = "fat"
codegen-units = 1

[profile.flamegraph]
inherits = "release"
debug = "line-tables-only"
strip = false

[profile.dev]
debug = 0
incremental = true

[profile.test]
debug = 0
incremental = true
