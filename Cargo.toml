[package]
name = "hifi"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", default-features = false, features = ["rt-multi-thread", "net", "io-util", "sync"] }
aho-corasick = "1"
bytes = "1"
directories = "6"
futures-util = { version = "0.3", default-features = false, features = ["std"] }
memchr = "2"
lru = "0.16"
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
rustls-pki-types = "1"
rustc-hash = "2"
serde_json = "1"
thiserror = "2"
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "tls12"] }
url = { version = "2", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
webpki-roots = "1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tokio = { version = "1", default-features = false, features = ["macros"] }

[profile.release]
lto = "thin"
codegen-units = 16
opt-level = 3
panic = "abort"
strip = true

[profile.dist]
inherits = "release"
lto = "fat"
codegen-units = 1

[profile.flamegraph]
inherits = "release"
debug = "line-tables-only"
strip = false

[profile.dev]
debug = 0
incremental = true

[profile.test]
debug = 0
incremental = true
